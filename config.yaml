# AudioScore — Configuration centralisée
# Tous les paramètres par défaut du pipeline de transcription

# ─────────────────────────────────────────────────────────────────────────────
# MODÈLES DE TRANSCRIPTION
# ─────────────────────────────────────────────────────────────────────────────
transcriber:
  # piano_transcription recommandé pour piano classique
  # (basic_pitch retiré : qualité inférieure sur piano classique)
  default: "piano_transcription"
  models:
    basic_pitch:
      model_path: "models/basic_pitch"
      model_type: "onnx"  # onnx | pytorch
      onset_threshold: 0.3
      frame_threshold: 0.3
      minimum_note_length: 58.0  # ms
      multiple_pitch_bends: false
      melodia_trick: true
    piano_transcription:
      model_path: "models/piano_transcription"
      model_type: "onnx"
      onset_threshold: 0.25   # Sensible : détecte les notes graves douces (défaut lib = 0.3)
      frame_threshold: 0.10   # Bas : capture les frames des basses (défaut lib = 0.1)
      offset_threshold: 0.25  # Bas : préserve les durées des graves prolongées
      minimum_note_length: 30.0  # ms : filtre ghost notes < 30ms (graves courts conservés)
      hq_mode: true
    transkun:
      model_path: "models/transkun"
      model_type: "onnx"
      onset_threshold: 0.35   # Plus sensible pour capturer les notes graves douces
      frame_threshold: 0.30  # Plus sensible pour les frames des basses
      minimum_note_length: 40.0  # Réduit pour capturer les graves courts
    hft:
      model_path: "models/hft"
      model_type: "onnx"
      onset_threshold: 0.25  # Bas pour capturer les notes graves douces (Chopin/Debussy)
      frame_threshold: 0.30
      offset_threshold: 0.25  # Bas pour préserver les durées des graves prolongées
  # ─────────────────────────────────────────────────────────────────────────────
  # ENSEMBLE VOTING (nouveau)
  # ─────────────────────────────────────────────────────────────────────────────
  # [TEST] Désactivé pour isoler les performances de Transkun seul
  ensemble:
    enabled: false  # ← Mettre true pour réactiver le vote multi-modèles
    models:
      - name: "piano_transcription"
        weight: 1.5
        onset_weight: 1.2
        pitch_weight: 1.0
        duration_weight: 1.0
      - name: "transkun"
        weight: 1.1
        onset_weight: 0.9
        pitch_weight: 1.1
        duration_weight: 1.1
      - name: "hft"            # Modèle Sony hFT-Transformer — excellent pour piano classique
        weight: 1.3
        onset_weight: 1.1
        pitch_weight: 1.0
        duration_weight: 1.0
    onset_tolerance: 0.05      # Tolérance temporelle pour grouper les notes (secondes)
    pitch_tolerance: 1         # Tolérance en demi-tons pour considérer même note
    min_votes: 2               # Votes minimum pour garder une note
    velocity_aggregation: "weighted_mean"  # "max" | "mean" | "weighted_mean"
    duration_aggregation: "median"         # "median" | "mean" | "weighted_mean"

# ─────────────────────────────────────────────────────────────────────────────
# SÉPARATION AUDIO (DEMUCS)
# ─────────────────────────────────────────────────────────────────────────────
demucs:
  enabled: false  # [P3] Désactivé par défaut piano solo (Phase 3)
  model: "htdemucs"  # htdemucs | htdemucs_ft | mdx_extra
  device: "auto"     # auto | cuda | mps | cpu
  shifts: 1          # nombre de shifts pour test-time augmentation
  overlap: 0.25      # chevauchement entre segments
  segment_length: 7.8  # secondes
  two_stems: "other" # [FIX] "other" = on isole le piano (retire les autres)

# ─────────────────────────────────────────────────────────────────────────────
# QUANTIFICATION RYTHMIQUE
# ─────────────────────────────────────────────────────────────────────────────
quantization:
  default: "standard"  # none | light | standard | heavy | rubato | triplets
  levels:
    none:
      grid_resolution: 0.0625      # 1/16 note (brut)
      ioi_tolerance: 0.0
      swing_ratio: 1.0
      detect_tuples: false
    light:
      grid_resolution: 0.125       # 1/8 note
      ioi_tolerance: 0.1
      swing_ratio: 1.0
      detect_tuples: false
    standard:
      grid_resolution: 0.125       # 1/8 note (double-croche) — adapté piano classique
      ioi_tolerance: 0.15
      swing_ratio: 1.0
      detect_tuples: true
    heavy:
      grid_resolution: 0.5         # 1/2 note
      ioi_tolerance: 0.25
      swing_ratio: 1.0
      detect_tuples: true
    rubato:
      grid_resolution: 0.0625      # grille fine pour capturer le rubato
      ioi_tolerance: 0.05
      swing_ratio: 1.0
      detect_tuples: false
      adaptive_tempo: true         # tempo variable par mesure
    triplets:
      grid_resolution: 0.1667      # base triolet (1/6)
      ioi_tolerance: 0.1
      swing_ratio: 1.0
      detect_tuples: true
      tuple_types: ["triplet", "quadruplet"]

# ─────────────────────────────────────────────────────────────────────────────
# SÉPARATION MAINS (VOICE SPLITTING)
# ─────────────────────────────────────────────────────────────────────────────
hand_split:
  method: "dynamic"  # fixed | dynamic | ml
  fixed_split_point: 57  # MIDI note (A3 = 57)
  dynamic:
    analyze_range: 24      # octaves à analyser autour du split
    hand_overlap: 2        # notes de chevauchement autorisées
    density_weight: 0.6    # poids densité notes vs registre
  ml:
    model_path: "models/hand_split.onnx"
    confidence_threshold: 0.6
    fallback: "dynamic"

# ─────────────────────────────────────────────────────────────────────────────
# DÉTECTION TEMPO
# ─────────────────────────────────────────────────────────────────────────────
tempo:
  detector: "librosa"  # librosa | madmom | beatnet
  min_bpm: 40
  max_bpm: 220
  default_bpm: 120
  madmom:
    model: "DBNBeatTrackingProcessor"
    fps: 100
  beatnet:
    model_path: "models/beatnet.onnx"

# ─────────────────────────────────────────────────────────────────────────────
# DÉTECTION TONALITÉ
# ─────────────────────────────────────────────────────────────────────────────
key:
  detector: "krumhansl"  # krumhansl | keyfinder | madmom
  krumhansl:
    use_major_minor_profiles: true
    profile_weight: 1.0

# ─────────────────────────────────────────────────────────────────────────────
# DÉTECTION PÉDALE & ORNEMENTS
# ─────────────────────────────────────────────────────────────────────────────
pedal:
  enabled: true
  onset_threshold: 0.3
  release_threshold: 0.2
  min_pedal_duration: 0.1  # secondes

ornaments:
  enabled: true
  grace_note_max_duration: 0.15  # secondes
  trill_min_speed: 8  # Hz
  mordent_max_duration: 0.2

# ─────────────────────────────────────────────────────────────────────────────
# FILTRAGE HARMONIQUE (suppression des notes fantômes)
# ─────────────────────────────────────────────────────────────────────────────
# Supprime les harmoniques causées par la pédale forte du piano.
# Une note grave jouée avec pédale crée des harmoniques à l'octave (+12), quinte (+7),
# quarte (+5), et doubles octaves (+24).
# Ces harmoniques sont détectés comme des notes par l'IA et apparaissent en trop dans la partition.
harmonic_filter:
  enabled: true
  mode: "pedal-aware"
  modes:
    off:
      description: "Filtrage désactivé"
    basic:
      description: "Filtre simple (octave + quinte)"
      intervals: [12, 7]
      velocity_threshold: 60
      time_window: 0.05
    classical:
      description: "Recommandé pour Chopin, Debussy, musique classique"
      intervals: [12, 7, 5, 24]
      velocity_threshold: 50
      time_window: 0.05
      register_protection: true
    aggressive:
      description: "Pour partitions très complexes (mazurkas, nocturnes)"
      intervals: [12, 7, 5, 24, 19]
      velocity_threshold: 40
      time_window: 0.08
      register_protection: true
      harmonic_chain: true
    classical-strong:
      description: "Mode renforcé pour Chopin/Debussy — plus agressif que pedal-aware"
      intervals: [12, 7, 5, 24, 19]
      velocity_threshold: 45
      time_window: 0.1
      register_protection: true
      harmonic_chain: true
      duration_analysis: true
      pedal_zone_detection: true
      velocity_ratio: 0.35
    pedal-aware:
      description: "Spécialisé harmoniques de pédale — le plus efficace pour notes en trop"
      intervals: [12, 7, 5, 24]
      velocity_threshold: 55
      time_window: 0.12
      register_protection: true
      harmonic_chain: true
      duration_analysis: true
      pedal_zone_detection: true
    transkun-chord:
      description: "Recommandé pour classique : Transkun + filtre contextuel par accord — supprime les notes parasites dans les accords"
      intervals: [12, 7, 5, 24]
      velocity_threshold: 45
      time_window: 0.10
      register_protection: true
      harmonic_chain: true
      duration_analysis: true
      pedal_zone_detection: true
      chord_context: true
      chord_sim_tolerance: 0.04
      chord_main_velocity_min: 0.50
      chord_suspect_ratio: 0.45

# ─────────────────────────────────────────────────────────────────────────────
# GESTION MATÉRIEL (GPU/CPU)
# ─────────────────────────────────────────────────────────────────────────────
device:
  preference: "auto"  # auto | cuda | mps | cpu
  cpu_threads: 0     # 0 = auto (min(8, cpu_count))
  gpu_memory_fraction: 0.85  # fraction VRAM à utiliser
  allow_fallback: true
  batch_size:
    auto: true
    cpu: 1
    cuda: 4
    mps: 2

# ─────────────────────────────────────────────────────────────────────────────
# CACHE MODÈLES
# ─────────────────────────────────────────────────────────────────────────────
model_cache:
  enabled: true
  max_models_in_memory: 3
  preload_on_startup:
    - "piano_transcription"
  lazy_load: true
  cache_dir: "models/.cache"

# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE ASYNCHRONE
# ─────────────────────────────────────────────────────────────────────────────
pipeline:
  stages:
    - name: "load_audio"
      weight: 5
      description: "Chargement audio"
    - name: "demucs"
      weight: 30
      description: "Séparation Demucs"
      optional: true
    - name: "transcribe"
      weight: 40
      description: "Transcription IA"
    - name: "quantize"
      weight: 10
      description: "Quantification"
    - name: "split_hands"
      weight: 5
      description: "Séparation mains"
    - name: "build_score"
      weight: 5
      description: "Construction partition"
    - name: "export"
      weight: 5
      description: "Export fichiers"
  progress_update_interval: 0.1  # secondes
  timeout_per_stage: 300  # secondes

# ─────────────────────────────────────────────────────────────────────────────
# ORNEMENTS
# ─────────────────────────────────────────────────────────────────────────────
ornaments:
  arpeggio:
    enabled: true
    max_gap_beats: 0.125        # double-croche max entre notes
    min_notes: 2                # minimum de notes pour considérer un arpège
    min_pitch_interval: 3       # minimum demi-tons entre notes
    max_total_span_beats: 1.5   # durée totale max du groupe

# ─────────────────────────────────────────────────────────────────────────────
# EXPORT & RENDU
# ─────────────────────────────────────────────────────────────────────────────
export:
  formats: ["pdf", "midi", "musicxml"]
  pdf:
    page_size: "A4"
    margin_mm: 12
    title: "AudioScore — Partition Piano"
  midi:
    ticks_per_beat: 480
    include_pedal: true
  musicxml:
    use_music21: true
    validate_xsd: true
    version: "4.0"

# ─────────────────────────────────────────────────────────────────────────────
# SERVEUR
# ─────────────────────────────────────────────────────────────────────────────
server:
  host: "127.0.0.1"
  port: 5000
  debug: false
  max_content_length: 100 * 1024 * 1024  # 100 MB
  cors_origins: ["http://localhost:3000", "http://127.0.0.1:5000"]
  sse_heartbeat_interval: 15  # secondes

# ─────────────────────────────────────────────────────────────────────────────
# FRONTEND
# ─────────────────────────────────────────────────────────────────────────────
frontend:
  default_language: "fr"
  supported_languages: ["fr", "en", "es", "de", "ja", "zh"]
  theme: "auto"  # light | dark | auto
  practice_mode:
    default_tempo_range: [50, 100]  # % de vitesse
    metronome_volume: 0.3
    loop_crossfade: 0.1  # secondes